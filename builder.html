<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <title>GitGloss Builder — Widget Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/builder.css">
  <!-- Google AdSense — pub-ID 발급 후 아래 코드 활성화 -->
  <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-REPLACE_WITH_YOUR_PUB_ID" crossorigin="anonymous"></script> -->
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <button class="panel-toggle-btn" id="panel-toggle" aria-label="패널 열기">☰</button>
    <a href="index.html" class="topbar-logo">GitGloss</a>
    <div class="topbar-sep"></div>
    <span class="topbar-title">Widget Studio</span>
    <div class="topbar-actions">
      <a href="gallery.html" class="topbar-back">← 갤러리</a>
    </div>
  </header>

  <div class="panel-overlay" id="panel-overlay"></div>

  <div class="builder-body">

    <!-- ══ LEFT: 블록 조합 패널 ══ -->
    <aside class="panel-left" id="panel-left">

      <!-- ① 프리셋 테마 -->
      <div class="section-label">프리셋 테마</div>
      <div class="preset-filter-row">
        <button class="preset-filter on" data-f="all"     onclick="switchPresetFilter(this,'all')">전체</button>
        <button class="preset-filter"    data-f="stats"   onclick="switchPresetFilter(this,'stats')">Stats</button>
        <button class="preset-filter"    data-f="tech"    onclick="switchPresetFilter(this,'tech')">Tech</button>
        <button class="preset-filter"    data-f="profile" onclick="switchPresetFilter(this,'profile')">Profile</button>
        <button class="preset-filter"    data-f="links"   onclick="switchPresetFilter(this,'links')">Links</button>
      </div>
      <div class="preset-grid" id="preset-grid">
        <!-- JS가 렌더 -->
      </div>

      <div class="divider"></div>

      <!-- ② 카드 스타일 -->
      <div class="section-label">카드 스타일</div>
      <div class="style-grid">
        <button class="style-btn on" data-style="glass"    onclick="setStyle(this,'glass')">🪟 Glass</button>
        <button class="style-btn"    data-style="dark"     onclick="setStyle(this,'dark')">🌑 Dark</button>
        <button class="style-btn"    data-style="neu"      onclick="setStyle(this,'neu')">🫧 Soft</button>
        <button class="style-btn"    data-style="border"   onclick="setStyle(this,'border')">⬜ Border</button>
        <button class="style-btn"    data-style="gradient" onclick="toggleGradientPicker(this)">🌈 Gradient ▾</button>
        <button class="style-btn"    data-style="minimal"  onclick="setStyle(this,'minimal')">◻ Minimal</button>
      </div>
      <!-- 그라디언트 선택 드롭다운 -->
      <div class="gradient-picker" id="gradient-picker">
        <button class="grad-opt" data-grad="sunset"   onclick="setGradient(this,'sunset')">🌅 Sunset</button>
        <button class="grad-opt" data-grad="ocean"    onclick="setGradient(this,'ocean')">🌊 Ocean</button>
        <button class="grad-opt" data-grad="forest"   onclick="setGradient(this,'forest')">🌿 Forest</button>
        <button class="grad-opt" data-grad="candy"    onclick="setGradient(this,'candy')">🍬 Candy</button>
        <button class="grad-opt" data-grad="midnight" onclick="setGradient(this,'midnight')">🌃 Midnight</button>
        <button class="grad-opt" data-grad="aurora"   onclick="setGradient(this,'aurora')">🌌 Aurora</button>
      </div>

      <!-- ③ 액센트 색상 -->
      <div class="section-label">액센트 색상</div>
      <div class="color-row">
        <button class="sw on"  style="background:#4285F4" title="#4285F4" onclick="setAccent(this,'#4285F4')"></button>
        <button class="sw"     style="background:#EA4335" title="#EA4335" onclick="setAccent(this,'#EA4335')"></button>
        <button class="sw"     style="background:#FBBC05" title="#FBBC05" onclick="setAccent(this,'#FBBC05')"></button>
        <button class="sw"     style="background:#34A853" title="#34A853" onclick="setAccent(this,'#34A853')"></button>
        <button class="sw"     style="background:#ED93B1" title="#ED93B1" onclick="setAccent(this,'#ED93B1')"></button>
        <button class="sw"     style="background:#9B8FE8" title="#9B8FE8" onclick="setAccent(this,'#9B8FE8')"></button>
        <button class="sw"     style="background:#7EC8E3" title="#7EC8E3" onclick="setAccent(this,'#7EC8E3')"></button>
        <button class="sw"     style="background:#08080F" title="#08080F" onclick="setAccent(this,'#08080F')"></button>
      </div>

      <div class="divider"></div>

      <!-- ④ 블록 추가 -->
      <div class="section-label">블록 추가</div>
      <div class="block-add-grid">
        <button class="block-add-btn" onclick="addBlock('avatar')">😀 이모지</button>
        <button class="block-add-btn" onclick="addBlock('name')">✏️ 이름/직무</button>
        <button class="block-add-btn" onclick="addBlock('stats')">📊 Stats</button>
        <button class="block-add-btn" onclick="addBlock('badges')">🏷️ 기술 배지</button>
        <button class="block-add-btn" onclick="addBlock('streak')">🔥 스트릭</button>
        <button class="block-add-btn" onclick="addBlock('links')">🔗 링크</button>
        <button class="block-add-btn" onclick="addBlock('bio')">📝 소개글</button>
        <button class="block-add-btn" onclick="addBlock('divider')">➖ 구분선</button>
        <button class="block-add-btn" onclick="addBlock('trophy')">🏆 GitHub Trophy</button>
        <button class="block-add-btn" onclick="addBlock('snake')">🐍 Snake Game</button>
        <button class="block-add-btn" onclick="addBlock('hits')">👁️ Hits 카운터</button>
        <button class="block-add-btn" onclick="addBlock('coffee')">☕ 커피 카운터</button>
        <button class="block-add-btn" onclick="addBlock('banner')">🎨 배너</button>
        <button class="block-add-btn" onclick="addBlock('typing')">⌨️ 타이핑 SVG</button>
      </div>

      <div class="divider"></div>

      <!-- ⑤ 활성 블록 목록 -->
      <div class="section-label">
        활성 블록
        <span style="font-size:9px;color:var(--text-hint);font-weight:400;margin-left:4px;">드래그로 순서 변경</span>
      </div>
      <div id="block-list"></div>

      <div class="panel-left-spacer"></div>

      <!-- AD-B1: 빌더 사이드바 하단 (카카오 애드핏 300×250) -->
      <div class="ad-slot-left" id="ad-b1">
        <ins class="kakao_ad_area" style="display:none;"
             data-ad-unit="DAN-REPLACE_WITH_YOUR_UNIT_ID"
             data-ad-width="300"
             data-ad-height="250"></ins>
        <script type="text/javascript" src="//t1.daumcdn.net/kas/static/ba.min.js" async></script>
      </div>

      <div class="panel-left-footer">
        © 2025 GitGloss · <a href="privacy.html">Privacy</a> · <a href="terms.html">Terms</a>
      </div>

    </aside>

    <!-- ══ RIGHT: 프리뷰 + 코드 ══ -->
    <div class="panel-right">

      <div class="preview-area" id="preview-area">
        <div class="preview-bg-dots"></div>
        <div class="widget-card" id="widget-card">
          <!-- widget-engine.js가 렌더 -->
        </div>
      </div>

      <div class="code-strip">
        <div class="code-tabs-row">
          <button class="ctab on"  onclick="selCtab(this,'md')"   data-fmt="md">Markdown</button>
          <button class="ctab"     onclick="selCtab(this,'html')" data-fmt="html">HTML</button>
        </div>
        <div class="code-body">
          <pre id="code-pre" class="code-pre"></pre>
          <button class="copy-btn" id="copy-btn" onclick="doCopy()">Copy</button>
        </div>
        <div class="ad-slide" id="ad-b2">
          <!-- AD-B2: Copy 후 슬라이드인 (Google AdSense 728×90) -->
          <div class="ad-slide-inner">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-REPLACE_WITH_YOUR_PUB_ID"
                 data-ad-slot="REPLACE_WITH_SLOT_ID"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="assets/data/templates.js"></script>
  <script src="assets/js/widget-engine.js"></script>
  <script>
    // 모바일 드로어
    (function(){
      const btn=document.getElementById('panel-toggle');
      const panel=document.getElementById('panel-left');
      const overlay=document.getElementById('panel-overlay');
      if(!btn||!panel||!overlay) return;
      btn.addEventListener('click',()=>{
        const open=panel.classList.toggle('open');
        overlay.classList.toggle('visible',open);
        btn.textContent = open ? '✕' : '☰';
      });
      overlay.addEventListener('click',()=>{
        panel.classList.remove('open');
        overlay.classList.remove('visible');
        btn.textContent='☰';
      });
    })();
  </script>
</body>
</html>
