<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <meta name="msvalidate.01" content="A2891CCBCAC29E2D299E1DC3D15D3A97" />
  <title>GitGloss Builder — Widget Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/builder.css">
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <style>
    .material-symbols-rounded {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      font-size: 24px;
    }

    /* ── Builder Redesign Overrides ── */
    :root {
      --topbar-height: 56px;
    }

    .topbar {
      height: var(--topbar-height) !important;
      background: var(--fluent-acrylic) !important;
      backdrop-filter: var(--fluent-blur) !important;
      border-bottom: var(--fluent-border) !important;
      box-shadow: var(--fluent-shadow-sm) !important;
      padding: 0 var(--s6) !important;
    }

    .topbar-logo {
      font: var(--title-lg) !important;
      color: var(--m3-primary) !important;
    }

    .builder-body {
      height: calc(100vh - var(--topbar-height)) !important;
    }

    .panel-left {
      background: var(--m3-surface) !important;
      border-right: var(--fluent-border) !important;
      padding: var(--s4) !important;
    }

    .section-label {
      font: var(--label-lg) !important;
      color: var(--m3-primary) !important;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin: var(--s6) 0 var(--s2) !important;
    }

    .preset-filter {
      font: var(--label-lg) !important;
      border-radius: 100px !important;
      padding: 8px 16px !important;
      border: 1px solid var(--m3-outline-variant) !important;
      background: transparent !important;
      color: var(--m3-on-surface-variant) !important;
      transition: all 0.2s !important;
    }

    .preset-filter.on {
      background: var(--m3-primary) !important;
      color: var(--m3-on-primary) !important;
      border-color: var(--m3-primary) !important;
    }

    .style-btn {
      border-radius: 12px !important;
      font: var(--label-lg) !important;
      border: 1px solid var(--m3-outline-variant) !important;
      transition: all 0.2s !important;
    }

    .style-btn.on {
      border-color: var(--m3-primary) !important;
      background: var(--m3-primary-container) !important;
      color: var(--m3-on-primary-container) !important;
    }

    .block-add-btn {
      border-radius: 12px !important;
      border: 1px solid var(--m3-outline-variant) !important;
      background: var(--m3-surface) !important;
      font: var(--label-lg) !important;
      padding: 12px !important;
      transition: all 0.2s !important;
    }

    .block-add-btn:hover {
      background: var(--m3-surface-variant) !important;
      border-color: var(--m3-primary) !important;
    }

    .code-strip {
      background: var(--m3-surface) !important;
      border: var(--fluent-border) !important;
      border-radius: 16px !important;
      overflow: hidden;
      box-shadow: var(--fluent-shadow-md) !important;
    }

    .ctab.on {
      background: var(--m3-primary) !important;
      color: var(--m3-on-primary) !important;
    }
  </style>
  <meta name="msvalidate.01" content="A2891CCBCAC29E2D299E1DC3D15D3A97" />
</head>

<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <button class="panel-toggle-btn" id="panel-toggle" aria-label="패널 열기">☰</button>
    <a href="index.html" class="topbar-logo">GitGloss</a>
    <div class="topbar-sep"></div>
    <span class="topbar-title">Widget Studio</span>
    <div class="topbar-actions">
      <button class="topbar-help" onclick="startTour()" title="사용 방법 보러가기"
        style="background:none; border:none; cursor:pointer; color:var(--text-hint); font-size:18px; display:flex; align-items:center; justify-content:center; margin-right:8px;"><span
          class="material-symbols-rounded" style="font-size:20px;">help_outline</span></button>
      <a href="gallery.html" class="topbar-back">← 갤러리</a>
    </div>
  </header>

  <div class="panel-overlay" id="panel-overlay"></div>

  <div class="builder-body">

    <!-- ══ LEFT: 블록 조합 패널 ══ -->
    <aside class="panel-left" id="panel-left">

      <!-- ① 프리셋 테마 -->
      <div class="section-label">프리셋 테마</div>
      <div class="preset-filter-row">
        <button class="preset-filter on" data-f="all" onclick="switchPresetFilter(this,'all')">전체</button>
        <button class="preset-filter" data-f="stats" onclick="switchPresetFilter(this,'stats')">Stats</button>
        <button class="preset-filter" data-f="tech" onclick="switchPresetFilter(this,'tech')">Tech</button>
        <button class="preset-filter" data-f="profile" onclick="switchPresetFilter(this,'profile')">Profile</button>
        <button class="preset-filter" data-f="links" onclick="switchPresetFilter(this,'links')">Links</button>
        <button class="preset-filter" data-f="creative" onclick="switchPresetFilter(this,'creative')">Creative</button>
      </div>
      <div class="preset-grid" id="preset-grid">
        <!-- JS가 렌더 -->
      </div>

      <div class="divider"></div>

      <!-- ② 카드 스타일 -->
      <div class="section-label">카드 스타일</div>
      <div class="style-grid">
        <button class="style-btn on" data-style="glass" onclick="setStyle(this,'glass')">🪟 Glass</button>
        <button class="style-btn" data-style="dark" onclick="setStyle(this,'dark')">🌑 Dark</button>
        <button class="style-btn" data-style="neu" onclick="setStyle(this,'neu')">🫧 Soft</button>
        <button class="style-btn" data-style="border" onclick="setStyle(this,'border')">⬜ Border</button>
        <button class="style-btn" data-style="gradient" onclick="toggleGradientPicker(this)">🌈 Gradient ▾</button>
        <button class="style-btn" data-style="minimal" onclick="setStyle(this,'minimal')">◻ Minimal</button>
      </div>
      <!-- 그라디언트 선택 드롭다운 -->
      <div class="gradient-picker" id="gradient-picker">
        <button class="grad-opt" data-grad="sunset" onclick="setGradient(this,'sunset')">🌅 Sunset</button>
        <button class="grad-opt" data-grad="ocean" onclick="setGradient(this,'ocean')">🌊 Ocean</button>
        <button class="grad-opt" data-grad="forest" onclick="setGradient(this,'forest')">🌿 Forest</button>
        <button class="grad-opt" data-grad="candy" onclick="setGradient(this,'candy')">🍬 Candy</button>
        <button class="grad-opt" data-grad="midnight" onclick="setGradient(this,'midnight')">🌃 Midnight</button>
        <button class="grad-opt" data-grad="aurora" onclick="setGradient(this,'aurora')">🌌 Aurora</button>
      </div>

      <!-- ③ 액센트 색상 -->
      <div class="section-label">액센트 색상</div>
      <div class="color-row">
        <button class="sw on" style="background:#4285F4" title="#4285F4" onclick="setAccent(this,'#4285F4')"></button>
        <button class="sw" style="background:#EA4335" title="#EA4335" onclick="setAccent(this,'#EA4335')"></button>
        <button class="sw" style="background:#FBBC05" title="#FBBC05" onclick="setAccent(this,'#FBBC05')"></button>
        <button class="sw" style="background:#34A853" title="#34A853" onclick="setAccent(this,'#34A853')"></button>
        <button class="sw" style="background:#ED93B1" title="#ED93B1" onclick="setAccent(this,'#ED93B1')"></button>
        <button class="sw" style="background:#9B8FE8" title="#9B8FE8" onclick="setAccent(this,'#9B8FE8')"></button>
        <button class="sw" style="background:#7EC8E3" title="#7EC8E3" onclick="setAccent(this,'#7EC8E3')"></button>
        <button class="sw" style="background:#08080F" title="#08080F" onclick="setAccent(this,'#08080F')"></button>
      </div>

      <div class="divider"></div>

      <!-- ④ 블록 추가 -->
      <div class="section-label">블록 추가</div>
      <div class="block-add-grid">
        <button class="block-add-btn" onclick="addBlock('avatar')"><img
            src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Technologist/3D/technologist_3d.png"
            width="20"> 이모지</button>
        <button class="block-add-btn" onclick="addBlock('name')"><img
            src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Writing%20Hand/3D/writing_hand_3d.png"
            width="20"> 이름/직무</button>
        <button class="block-add-btn" onclick="addBlock('stats')"><img
            src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Bar%20Chart/3D/bar_chart_3d.png"
            width="20"> Stats</button>
        <button class="block-add-btn" onclick="addBlock('badges')"><img
            src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Label/3D/label_3d.png" width="20"> 기술
          배지</button>
        <button class="block-add-btn" onclick="addBlock('streak')"><img
            src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Fire/3D/fire_3d.png" width="20">
          스트릭</button>
        <button class="block-add-btn" onclick="addBlock('links')"><img
            src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Link/3D/link_3d.png" width="20">
          링크</button>
        <button class="block-add-btn" onclick="addBlock('bio')"><img
            src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Memo/3D/memo_3d.png" width="20">
          소개글</button>
        <button class="block-add-btn" onclick="addBlock('divider')"><img
            src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Horizontal%20Line/3D/horizontal_line_3d.png"
            width="20"> 구분선</button>
        <button class="block-add-btn" onclick="addBlock('trophy')"><img
            src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Trophy/3D/trophy_3d.png" width="20">
          GitHub Trophy</button>
        <button class="block-add-btn" onclick="addBlock('snake')"><img
            src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Snake/3D/snake_3d.png" width="20">
          Snake Game</button>
        <button class="block-add-btn" onclick="addBlock('hits')"><img
            src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Eye/3D/eye_3d.png" width="20"> Hits
          카운터</button>
        <button class="block-add-btn" onclick="addBlock('coffee')"><img
            src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Hot%20Beverage/3D/hot_beverage_3d.png"
            width="20"> 커피 카운터</button>
        <button class="block-add-btn" onclick="addBlock('banner')"><img
            src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Artist%20Palette/3D/artist_palette_3d.png"
            width="20"> 배너</button>
        <button class="block-add-btn" onclick="addBlock('typing')"><img
            src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Keyboard/3D/keyboard_3d.png"
            width="20"> 타이핑 SVG</button>
      </div>

      <div class="divider"></div>

      <!-- ⑤ 활성 블록 목록 -->
      <div class="section-label">
        활성 블록
        <span style="font-size:9px;color:var(--text-hint);font-weight:400;margin-left:4px;">드래그로 순서 변경</span>
      </div>
      <div id="block-list"></div>

      <div class="panel-left-spacer"></div>

      <!-- AD-B1: 빌더 사이드바 하단 (카카오 애드핏 300×250) -->
      <div class="ad-slot-left" id="ad-b1">
        <ins class="kakao_ad_area" style="display:none;" data-ad-unit="DAN-REPLACE_WITH_YOUR_UNIT_ID"
          data-ad-width="300" data-ad-height="250"></ins>
        <script type="text/javascript" src="//t1.daumcdn.net/kas/static/ba.min.js" async></script>
      </div>

      <div class="panel-left-footer">
        © 2025 GitGloss · <a href="privacy.html">Privacy</a> · <a href="terms.html">Terms</a>
      </div>

    </aside>

    <!-- ══ RIGHT: 프리뷰 + 코드 ══ -->
    <div class="panel-right">

      <div class="preview-area" id="preview-area">
        <div class="preview-bg-dots"></div>
        <div class="widget-card" id="widget-card">
          <!-- widget-engine.js가 렌더 -->
        </div>
      </div>

      <div class="code-strip">
        <div class="code-tabs-row">
          <button class="ctab on" onclick="selCtab(this,'md')" data-fmt="md">Markdown</button>
          <button class="ctab" onclick="selCtab(this,'html')" data-fmt="html">HTML</button>
        </div>
        <div class="code-body">
          <pre id="code-pre" class="code-pre"></pre>
          <button class="copy-btn" id="copy-btn" onclick="doCopy()">Copy</button>
        </div>
        <div class="ad-slide" id="ad-b2">
          <!-- AD-B2: Copy 후 슬라이드인 (Google AdSense 728×90) -->
          <div class="ad-slide-inner">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-REPLACE_WITH_YOUR_PUB_ID"
              data-ad-slot="REPLACE_WITH_SLOT_ID" data-ad-format="auto" data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ══ Guided Tour UI ══ -->
  <div class="gg-tooltip-dim" id="tour-dim" onclick="closeTour()"></div>
  <div class="gg-tooltip" id="tour-tooltip">
    <div id="tour-text"></div>
    <div class="gg-tooltip-actions">
      <button class="gg-tooltip-btn" onclick="closeTour()">건너뛰기</button>
      <button class="gg-tooltip-btn primary" id="tour-next" onclick="nextTour()">다음</button>
    </div>
  </div>

  <script src="assets/data/templates.js"></script>
  <script src="assets/js/widget-engine.js"></script>
  <script>
    // Guided Tour Logic
    const tourSteps = [
      {
        target: '#preset-grid',
        content: '마음에 드는 템플릿을 선택해 보세요. 한 번의 클릭으로 전체 분위기가 달라져요.',
        dir: 'left',
        pos: 'right'
      },
      {
        target: '.block-add-grid',
        content: '부족한 정보는 여기서 채워 보세요. 드래그로 순서도 내 마음대로 바꿀 수 있어요.',
        dir: 'left',
        pos: 'right'
      },
      {
        target: '#preview-area',
        content: '지금 바로 확인해 보세요. 수정하는 즉시 실시간으로 반영돼요.',
        dir: 'right',
        pos: 'left'
      },
      {
        target: '#copy-btn',
        content: '다 완성했다면 코드를 복사해 보세요. 깃허브 프로필에 붙여넣기만 하면 끝이에요.',
        dir: 'bottom',
        pos: 'top'
      }
    ];

    let currentStep = 0;

    function startTour() {
      currentStep = 0;
      document.getElementById('tour-dim').classList.add('visible');
      showStep(0);
    }

    function showStep(idx) {
      const step = tourSteps[idx];
      const target = document.querySelector(step.target);
      const tooltip = document.getElementById('tour-tooltip');
      const text = document.getElementById('tour-text');
      const btnNext = document.getElementById('tour-next');

      if (!target) return nextTour(); // Skip if target not found

      text.innerText = step.content;
      btnNext.innerText = idx === tourSteps.length - 1 ? '시작하기' : '다음';

      // Highlight target
      document.querySelectorAll('.tour-highlight').forEach(el => el.classList.remove('tour-highlight'));
      target.classList.add('tour-highlight');

      tooltip.classList.add('visible');
      tooltip.setAttribute('data-dir', step.dir);

      const rect = target.getBoundingClientRect();
      const tooltipRect = tooltip.getBoundingClientRect();
      let top, left;

      if (step.pos === 'right') {
        left = rect.right + 20;
        top = rect.top + rect.height / 2 - tooltip.offsetHeight / 2;
      } else if (step.pos === 'left') {
        left = rect.left - tooltip.offsetWidth - 20;
        top = rect.top + rect.height / 2 - tooltip.offsetHeight / 2;
      } else if (step.pos === 'top') {
        left = rect.left + rect.width / 2 - tooltip.offsetWidth / 2;
        top = rect.top - tooltip.offsetHeight - 20;
      } else if (step.pos === 'bottom') {
        left = rect.left + rect.width / 2 - tooltip.offsetWidth / 2;
        top = rect.bottom + 20;
      }

      // Window boundary check
      if (left < 10) left = 10;
      if (left + tooltip.offsetWidth > window.innerWidth - 10) left = window.innerWidth - tooltip.offsetWidth - 10;
      if (top < 10) top = 10;
      if (top + tooltip.offsetHeight > window.innerHeight - 10) top = window.innerHeight - tooltip.offsetHeight - 10;

      tooltip.style.top = top + 'px';
      tooltip.style.left = left + 'px';
    }

    function nextTour() {
      currentStep++;
      if (currentStep < tourSteps.length) {
        showStep(currentStep);
      } else {
        closeTour();
      }
    }

    function closeTour() {
      document.getElementById('tour-dim').classList.remove('visible');
      document.getElementById('tour-tooltip').classList.remove('visible');
      document.querySelectorAll('.tour-highlight').forEach(el => el.classList.remove('tour-highlight'));
    }

    // 모바일 드로어
    (function () {
      const btn = document.getElementById('panel-toggle');
      const panel = document.getElementById('panel-left');
      const overlay = document.getElementById('panel-overlay');
      if (!btn || !panel || !overlay) return;
      btn.addEventListener('click', () => {
        const open = panel.classList.toggle('open');
        overlay.classList.toggle('visible', open);
        btn.textContent = open ? '✕' : '☰';
      });
      overlay.addEventListener('click', () => {
        panel.classList.remove('open');
        overlay.classList.remove('visible');
        btn.textContent = '☰';
      });
    })();
  </script>
</body>

</html>
