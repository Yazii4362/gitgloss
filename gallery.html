<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitGloss Gallery — Premium Widget Templates</title>
  <meta name="description" content="200+ 프리미엄 GitHub README 위젯 템플릿. 클릭 한 번으로 빌더에서 바로 커스터마이징하세요.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    
    body {
      margin: 0;
      padding: 0;
      background: var(--bg-main);
      background-image: var(--grid-pattern);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Gallery Header */
    .gallery-header {
      padding: 80px 80px 60px;
      text-align: center;
      position: relative;
    }
    
    .gallery-header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 300px;
      background: radial-gradient(circle, rgba(66,133,244,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .gallery-eyebrow {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--google-blue);
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    .gallery-title {
      font-size: 48px;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 16px;
      letter-spacing: -.02em;
      position: relative;
      z-index: 1;
    }

    .gallery-desc {
      font-size: 18px;
      color: var(--text-sub);
      font-weight: 500;
      max-width: 600px;
      margin: 0 auto 40px;
      position: relative;
      z-index: 1;
    }

    /* Filter Tabs */
    .filter-tabs {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .filter-tab {
      padding: 10px 20px;
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      background: var(--glass-white);
      backdrop-filter: var(--blur-effect);
      -webkit-backdrop-filter: var(--blur-effect);
      color: var(--text-sub);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .25s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: var(--shadow-subtle);
    }

    .filter-tab:hover {
      background: rgba(66, 133, 244, 0.05);
      border-color: rgba(66, 133, 244, 0.2);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
    }

    .filter-tab.active {
      background: var(--google-blue);
      color: white;
      border-color: var(--google-blue);
      box-shadow: 0 6px 20px rgba(66, 133, 244, 0.35);
      transform: translateY(-2px);
    }

    /* Gallery Grid */
    .gallery-container {
      padding: 0 80px 80px;
      flex: 1;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-bottom: 40px;
    }

    /* Template Card */
    .template-card {
      background: var(--glass-white);
      backdrop-filter: var(--blur-effect);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 24px;
      cursor: pointer;
      transition: all .3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }

    .template-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gradient-glass);
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
    }

    .template-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-float);
      border-color: rgba(66, 133, 244, 0.3);
    }

    .template-card:hover::before {
      opacity: 0.3;
    }

    .template-card.coming-soon {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .template-card.coming-soon:hover {
      transform: none;
      box-shadow: var(--shadow-depth);
    }

    /* Preview Thumbnail */
    .template-preview {
      height: 180px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: var(--bg-subtle);
    }

    /* Preview Content Styles */
    .preview-stats {
      width: 85%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .preview-bar {
      height: 10px;
      border-radius: 5px;
      transition: all .3s;
    }

    .template-card:hover .preview-bar {
      transform: translateX(4px);
    }

    .preview-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .preview-badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.9);
      color: var(--text-main);
    }

    .preview-profile {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
    }

    .preview-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--gradient-blue-red);
      flex-shrink: 0;
    }

    .preview-info {
      flex: 1;
    }

    .preview-name {
      height: 12px;
      width: 80%;
      background: rgba(0, 0, 0, 0.1);
      border-radius: 6px;
      margin-bottom: 6px;
    }

    .preview-handle {
      height: 8px;
      width: 60%;
      background: rgba(0, 0, 0, 0.05);
      border-radius: 4px;
    }

    .preview-streak {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      padding: 12px;
    }

    .preview-cell {
      aspect-ratio: 1;
      border-radius: 3px;
      background: rgba(0, 0, 0, 0.1);
    }

    /* Template Info */
    .template-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .template-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    .template-category {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .category-stats {
      background: rgba(66, 133, 244, 0.1);
      color: #1967D2;
      border: 1px solid rgba(66, 133, 244, 0.2);
    }

    .category-tech {
      background: rgba(251, 188, 5, 0.15);
      color: #E37400;
      border: 1px solid rgba(251, 188, 5, 0.3);
    }

    .category-profile {
      background: rgba(234, 67, 53, 0.1);
      color: #C5221F;
      border: 1px solid rgba(234, 67, 53, 0.2);
    }

    .category-streak {
      background: rgba(52, 168, 83, 0.1);
      color: #188038;
      border: 1px solid rgba(52, 168, 83, 0.2);
    }

    .template-meta {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }

    .template-theme {
      font-size: 13px;
      color: var(--text-hint);
      font-weight: 500;
    }

    .template-badge {
      padding: 3px 8px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 700;
      background: rgba(52, 168, 83, 0.15);
      color: #188038;
    }

    .template-action {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      background: var(--google-blue);
      color: white;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      transition: all .2s;
    }

    .template-card:hover .template-action {
      background: var(--gradient-blue-red);
    }

    .coming-soon-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 20px;
    }

    .coming-soon-text {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-hint);
      text-transform: uppercase;
      letter-spacing: .1em;
    }

    /* Stats */
    .gallery-stats {
      text-align: center;
      padding: 40px 0;
      color: var(--text-hint);
      font-size: 14px;
      font-weight: 500;
    }
    
    /* Footer Enhancement */
    .page-footer {
      background: var(--glass-white);
      backdrop-filter: var(--blur-effect);
      -webkit-backdrop-filter: var(--blur-effect);
      border-top: 1px solid var(--glass-border);
      box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.04);
      margin-top: auto;
    }
    
    .footer-links {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }
    
    .footer-link {
      font-size: 13px;
      color: var(--text-sub);
      text-decoration: none;
      font-weight: 500;
      transition: color .2s;
    }
    
    .footer-link:hover {
      color: var(--google-blue);
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .gallery-header { padding: 60px 40px 40px; }
      .gallery-container { padding: 0 40px 60px; }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
      .gallery-title { font-size: 36px; }
      .page-footer { padding: 20px 40px; }
    }

    @media (max-width: 640px) {
      .gallery-header { padding: 40px 24px 32px; }
      .gallery-container { padding: 0 24px 48px; }
      .gallery-grid { grid-template-columns: 1fr; }
      .gallery-title { font-size: 28px; }
      .filter-tabs { gap: 8px; }
      .filter-tab { padding: 8px 16px; font-size: 13px; }
      .page-footer { 
        padding: 20px 24px;
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }
      .footer-links {
        flex-direction: column;
        gap: 12px;
      }
      .footer-copy {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <a href="index.html" class="nav-logo">GitGloss</a>
    <div class="nav-right">
      <a href="gallery.html" class="nav-link" style="color:var(--google-blue);font-weight:600;">갤러리</a>
      <a href="#guide" class="nav-link">가이드</a>
      <a href="#about" class="nav-link">소개</a>
      <a href="builder.html" class="nav-cta">
        <span>위젯 만들기</span>
      </a>
    </div>
  </nav>

  <!-- Gallery Header -->
  <div class="gallery-header">
    <div class="gallery-eyebrow">PREMIUM TEMPLATES</div>
    <h1 class="gallery-title">200+ 프리미엄 위젯</h1>
    <p class="gallery-desc">
      마음에 드는 위젯을 클릭하면 빌더에서 바로 커스터마이징할 수 있어요
    </p>

    <!-- Filter Tabs -->
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all">전체 (40)</button>
      <button class="filter-tab" data-filter="stats">Stats (10)</button>
      <button class="filter-tab" data-filter="tech">Tech (10)</button>
      <button class="filter-tab" data-filter="profile">Profile (10)</button>
      <button class="filter-tab" data-filter="streak">Mix (10)</button>
    </div>
  </div>

  <!-- Gallery Grid -->
  <div class="gallery-container">
    <div class="gallery-grid" id="gallery-grid">
      <!-- Templates will be rendered here by JavaScript -->
    </div>

    <div class="gallery-stats" id="gallery-stats">
      <!-- Stats will be rendered here -->
    </div>
  </div>

  <!-- Footer -->
  <footer class="page-footer">
    <a href="index.html" class="footer-logo">GitGloss</a>
    <div class="footer-links">
      <a href="gallery.html" class="footer-link">갤러리</a>

      <a href="terms.html" class="footer-link">이용약관</a>
      <a href="about.html" class="footer-link">소개</a>
      <a href="contact.html" class="footer-link">문의</a>
    </div>
    <span class="footer-copy">© 2025 GitGloss. All rights reserved.</span>
  </footer>

  <script src="assets/data/templates.js"></script>
  <script src="assets/js/gallery.js"></script>

</body>
</html>
