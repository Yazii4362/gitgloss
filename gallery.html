<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="title"       content="배지 갤러리 — GitGloss | GitHub 프로필 배지 템플릿 모음">
  <meta name="description" content="30가지 이상의 프로필 배지 템플릿. Flat, Gradient, Outline, Glass, Pill, Square 스타일을 무료로 사용하세요.">
  <meta name="keywords"    content="GitHub 배지, shields.io 스타일, GitHub README 배지, 개발자 배지 템플릿">
  <meta name="robots"      content="index, follow">
  <meta name="viewport"    content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4285F4">

  <!-- OG -->
  <meta property="og:title"       content="배지 갤러리 — GitGloss">
  <meta property="og:description" content="30가지 이상의 GitHub 프로필 배지 템플릿">
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://gitgloss.io/gallery.html">

  <title>GitGloss Gallery — Badge Templates</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }

    body {
      margin: 0; padding: 0;
      background: var(--bg-main);
      background-image: var(--grid-pattern);
      min-height: 100vh;
      display: flex; flex-direction: column;
    }

    /* Gallery Header */
    .gallery-header {
      padding: 72px 80px 56px;
      text-align: center;
      position: relative;
    }
    .gallery-header::before {
      content: '';
      position: absolute; top: 0; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 300px;
      background: radial-gradient(circle, rgba(66,133,244,0.07) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .gallery-eyebrow {
      font-size: 11px; font-weight: 700; letter-spacing: .15em;
      text-transform: uppercase; color: var(--google-blue);
      margin-bottom: 14px; position: relative; z-index: 1;
    }
    .gallery-title {
      font-size: 44px; font-weight: 800;
      color: var(--text-main); margin-bottom: 14px;
      letter-spacing: -.03em; position: relative; z-index: 1;
    }
    .gallery-desc {
      font-size: 17px; color: var(--text-sub); font-weight: 500;
      max-width: 560px; margin: 0 auto 36px;
      position: relative; z-index: 1;
    }

    /* Filter Tabs */
    .filter-tabs {
      display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
      position: relative; z-index: 1;
    }
    .filter-tab {
      padding: 9px 18px;
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      background: var(--glass-white);
      backdrop-filter: var(--blur-effect);
      color: var(--text-sub);
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .filter-tab:hover { background: rgba(66,133,244,0.05); border-color: rgba(66,133,244,0.2); transform: translateY(-1px); }
    .filter-tab.active {
      background: var(--google-blue); color: #fff;
      border-color: var(--google-blue);
      box-shadow: 0 4px 16px rgba(66,133,244,0.3);
    }

    /* Gallery Grid */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      margin-top: 24px;
    }

    .template-card {
      background: #fff;
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .template-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      border-color: var(--google-blue);
    }

    .template-preview {
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .template-header {
      padding: 20px;
      border-top: 1px solid rgba(0,0,0,0.04);
    }

    .template-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 4px;
    }

    .template-desc {
      font-size: 12px;
      color: var(--text-sub);
      line-height: 1.5;
      font-weight: 500;
    }

    .template-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
    }

    .category-badge {
      font-size: 10px;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .category-stats { background: rgba(66,133,244,0.1); color: #1967D2; }
    .category-tech { background: rgba(52,168,83,0.1); color: #188038; }
    .category-profile { background: rgba(234,67,53,0.1); color: #C5221F; }
    .category-streak { background: rgba(251,188,5,0.1); color: #E37400; }
    .category-links { background: rgba(155,143,232,0.1); color: #6a5fc1; }
    .category-banner { background: rgba(237,147,177,0.1); color: #b03058; }

    .template-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--google-blue);
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 20px;
      box-shadow: 0 4px 12px rgba(66,133,244,0.3);
      z-index: 2;
    }

    /* Gallery container */
    .gallery-container {
      padding: 0 80px 80px;
      flex: 1;
    }

    .gallery-stats {
      font-size: 13px;
      color: var(--text-hint);
      font-weight: 500;
      margin-bottom: 16px;
    }

    /* Template card extras */
    .template-theme {
      padding: 0 20px;
      font-size: 12px;
      color: var(--text-hint);
      line-height: 1.5;
      font-weight: 400;
    }

    .template-action {
      padding: 12px 20px 20px;
      font-size: 13px;
      font-weight: 700;
      color: var(--google-blue);
      transition: gap .2s;
    }

    .template-card:hover .template-action {
      color: var(--google-blue);
      text-decoration: underline;
    }

    .template-category {
      font-size: 10px;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Search input focus */
    #gallery-search:focus {
      border-color: var(--google-blue) !important;
      box-shadow: 0 0 0 3px rgba(66,133,244,0.12);
    }

    @media (max-width: 1024px) {
      .gallery-header    { padding: 56px 40px 40px; }
      .gallery-container { padding: 0 40px 60px; }
      .gallery-title     { font-size: 34px; }
      .gallery-grid      { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
    }
    @media (max-width: 640px) {
      .gallery-header    { padding: 40px 20px 32px; }
      .gallery-container { padding: 0 20px 48px; }
      .gallery-title     { font-size: 26px; }
      .gallery-grid      { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <a href="index.html" class="nav-logo">GitGloss</a>
    <div class="nav-right">
      <a href="gallery.html" class="nav-link" style="color:var(--google-blue);font-weight:700;">갤러리</a>
      <a href="about.html"   class="nav-link">소개</a>
      <a href="builder.html" class="nav-cta">배지 만들기</a>
    </div>
  </nav>

  <!-- Gallery Header -->
  <div class="gallery-header">
    <div class="gallery-eyebrow">PREMIUM WIDGETS</div>
    <h1 class="gallery-title">프로필 위젯 갤러리</h1>
    <p class="gallery-desc">
      기술 블로그 피드, 스포티파이 연동, MBTI 카드 등 67개 이상의 고퀄리티 위젯 템플릿을 확인해보세요.
      클릭하면 빌더에서 즉시 커스텀하고 Markdown을 복사할 수 있습니다.
    </p>

    <!-- Search & Filter -->
    <div style="max-width:600px; margin:0 auto; position:relative; z-index:1;">
      <div class="search-box" style="margin-bottom:24px; position:relative;">
        <input type="text" id="gallery-search" placeholder="위젯 검색 (예: Stats, Blog, Spotify...)" style="width:100%; padding:14px 20px 14px 44px; border-radius:14px; border:1px solid var(--glass-border); background:var(--glass-white); backdrop-filter:var(--blur-effect); font-size:14px; font-weight:500; outline:none; transition:border-color .2s;">
        <span style="position:absolute; left:16px; top:50%; transform:translateY(-50%); font-size:18px; opacity:0.3;">🔍</span>
      </div>

      <!-- Filter Tabs -->
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">전체</button>
        <button class="filter-tab" data-filter="stats">Stats</button>
        <button class="filter-tab" data-filter="tech">Tech</button>
        <button class="filter-tab" data-filter="profile">Profile</button>
        <button class="filter-tab" data-filter="streak">Streak</button>
        <button class="filter-tab" data-filter="links">Links</button>
        <button class="filter-tab" data-filter="banner">Banner</button>
      </div>
    </div>
  </div>

  <!-- Gallery Grid -->
  <div class="gallery-container">
    <div class="gallery-stats" id="gallery-stats">67개 템플릿 표시 중</div>
    <div class="gallery-grid" id="gallery-grid">
      <!-- gallery.js가 templates.js 데이터를 바탕으로 렌더 -->
    </div>
  </div>

  <!-- Footer -->
  <footer class="page-footer">
    <a href="index.html" class="footer-logo">GitGloss</a>
    <div class="footer-links">
      <a href="gallery.html" class="footer-link">갤러리</a>
      <a href="about.html"   class="footer-link">소개</a>
      <a href="privacy.html" class="footer-link">개인정보처리방침</a>
      <a href="terms.html"   class="footer-link">이용약관</a>
    </div>
    <span class="footer-copy">© 2025 GitGloss. All rights reserved.</span>
  </footer>

  <!-- SCRIPTS -->
  <script src="assets/data/templates.js"></script>
  <script src="assets/js/gallery.js"></script>

</body>
</html>
